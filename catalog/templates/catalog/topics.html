{% extends 'base.html' %}

{% block title %}Topics{% endblock %}

{% block content %}
  <div class="max-w-3xl mx-auto">
    <div
        class="flex flex-row justify-between pb-6 mb-10">
      <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Topics</h1>
      <a href="{% url 'learning_logs:new_topic' %}"
         class="bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-6 py-3 rounded-lg transition-all duration-300 shadow-md hover:shadow-lg active:shadow-sm">
        Create New Topic
      </a>
    </div>

    <ul class="grid grid-cols-1 md:grid-cols-2 gap-6 list-none p-0 m-0">
      {% for topic in topics %}
        <li class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm hover:shadow-xl hover:border-blue-300 transition-all duration-300 transform hover:-translate-y-1 active:translate-y-0">
          <p class="text-sm text-gray-400 mb-3 font-medium">{{ topic.date_added|date:'M d, Y H:i' }}</p>
          <a href="{% url 'learning_logs:topic' topic.id %}"
             class="block text-xl text-gray-800 hover:text-blue-600 font-semibold no-underline transition-colors duration-200 leading-relaxed">
            {{ topic.text }}
          </a>
        </li>
      {% empty %}
        <li class="col-span-full py-20 text-center bg-gray-50 rounded-2xl border border-dashed border-gray-200">
          <p class="text-gray-400 text-xl">No topics</p>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
