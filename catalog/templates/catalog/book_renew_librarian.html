{% extends "catalog/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-6">Renew: {{ book_instance.book.title }}</h1>

  <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6">
    <dl class="space-y-3 mb-6">
      <div>
        <dt class="text-sm font-medium text-gray-500 dark:text-gray-400">Borrower</dt>
        <dd class="mt-1 text-gray-900 dark:text-white">{{ book_instance.borrower }}</dd>
      </div>
      <div>
        <dt class="text-sm font-medium text-gray-500 dark:text-gray-400">Due Date</dt>
        <dd class="mt-1 {% if book_instance.is_overdue %}text-red-600 dark:text-red-400{% else %}text-gray-900 dark:text-white{% endif %}">
          {{ book_instance.due_back }}
          {% if book_instance.is_overdue %}
            <span class="text-sm">(Overdue)</span>
          {% endif %}
        </dd>
      </div>
    </dl>

    <form action="" method="post" class="django-form">
      {% csrf_token %}
      {{ form.as_div }}
      <button type="submit" class="btn-primary">Renew</button>
    </form>
  </div>
</div>
{% endblock %}
