{% for author in items %}
  <li class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-all duration-200">
    <a href="{{ author.get_absolute_url }}" class="block text-lg font-semibold text-blue-600 dark:text-blue-400 hover:underline mb-1">
      {{ author.name }}
    </a>
    {% if author.date_of_birth %}
      <p class="text-sm text-gray-500 dark:text-gray-400">{{ author.date_of_birth }} - {{ author.date_of_death|default:"present" }}</p>
    {% endif %}
  </li>
{% endfor %}
