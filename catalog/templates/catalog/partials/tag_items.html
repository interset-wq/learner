{% for item in items %}
  <li class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-all duration-200">
    <a href="{{ item.get_absolute_url }}" class="block text-lg font-semibold text-blue-600 dark:text-blue-400 hover:underline">
      {{ item.name }}
    </a>
  </li>
{% endfor %}
