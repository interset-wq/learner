{% for topic in items %}
  <li class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-5 hover:shadow-md transition-all duration-200">
    <a href="{% url 'learning_logs:topic' topic.id %}"
       class="text-xl text-blue-600 dark:text-blue-400 hover:underline font-medium block mb-2">
      {{ topic.text }}
    </a>
    <p class="text-sm text-gray-500 dark:text-gray-400">
      {{ topic.date_added|date:'M d, Y H:i' }}
    </p>
  </li>
{% endfor %}
