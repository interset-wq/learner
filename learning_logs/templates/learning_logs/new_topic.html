{% extends 'learning_logs/base.html' %}

{% block content %}
  <div class="max-w-3xl mx-auto">
    <h1 class="page-title">Add a new topic</h1>
    <form method="post" class="django-form" action="{% url 'learning_logs:new_topic' %}">
      {% csrf_token %}
      <div class="mb-4">
        <input type="text" name="text" id="id_text" placeholder="Topic name" class="input-field" required>
      </div>
      <div class="mb-4 flex items-center">
        {{ form.is_public }}
        <label for="id_is_public" class="text-gray-700 dark:text-gray-300">Make this topic public</label>
      </div>
      {{ form.is_public.errors }}
      <div>
        <button class="btn-primary">Add</button>
      </div>
    </form>
  </div>
{% endblock %}
