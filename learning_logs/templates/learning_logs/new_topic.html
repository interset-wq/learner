{% extends 'learning_logs/base.html' %}

{% block content %}
  <div class="max-w-3xl mx-auto">
    <h1 class="page-title">Add a new topic</h1>
    <form method="post" class="django-form" action="{% url 'learning_logs:new_topic' %}">
      {% csrf_token %}
      {{ form.as_div }}
      <div>
        <button class="btn-primary">Add</button>
      </div>
    </form>
  </div>
{% endblock %}
