{% load comment_tags %}
<button id="like-btn"
        hx-post="{% url 'learning_logs:toggle_like' entry.id %}"
        hx-target="#like-btn"
        hx-swap="outerHTML"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-all duration-200 group
               {% if liked %}text-red-500{% else %}text-gray-500 dark:text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20{% endif %}"
        {% if not user.is_authenticated %}disabled title="Login to like"{% endif %}>
  <svg class="w-[18px] h-[18px] transition-transform duration-200 group-active:scale-125"
       fill="{% if liked %}currentColor{% else %}none{% endif %}"
       viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
  </svg>
  <span class="text-xs font-medium">{{ entry.like_count }}</span>
</button>
