{% load comment_tags %}
<div class="comment-item htmx-added" id="comment-{{ comment.id }}" data-comment-id="{{ comment.id }}">
  <div class="flex items-start gap-3 py-3 group cursor-pointer comment-body">
    <a href="{% url 'accounts:public_profile' comment.user.username %}" class="flex-shrink-0" onclick="event.stopPropagation()">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br {{ comment.avatar_gradient }} flex items-center justify-center text-[10px] font-bold text-white ring-2 ring-white dark:ring-gray-800 hover:ring-blue-400 transition-all duration-200">
        {{ comment.user.username|first|upper }}
      </div>
    </a>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 flex-wrap">
        <a href="{% url 'accounts:public_profile' comment.user.username %}" class="username text-sm font-semibold text-gray-900 dark:text-white hover:text-blue-500 transition-colors" onclick="event.stopPropagation()">{{ comment.user.username }}</a>
        <span class="text-xs text-gray-400">now</span>
        {% if comment.user == user or topic_owner == user %}
          <button hx-delete="{% url 'learning_logs:delete_comment' comment.id %}"
                  hx-target="#comment-{{ comment.id }}"
                  hx-swap="outerHTML"
                  hx-confirm="Delete this comment?"
                  class="text-xs text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all duration-200 p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/20 ml-auto"
                  onclick="event.stopPropagation()">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        {% endif %}
      </div>
      <p class="text-sm text-gray-700 dark:text-gray-300 mt-1 leading-relaxed">{{ comment.text|highlight_mentions }}</p>
      <div class="mt-2 flex items-center gap-3">
        <button class="reply-toggle text-xs text-gray-400 hover:text-blue-500 transition-colors duration-200 flex items-center gap-1"
                data-comment-id="{{ comment.id }}" data-username="{{ comment.user.username }}" onclick="event.stopPropagation()">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
          </svg>
          Reply
        </button>
      </div>

      <div id="reply-form-{{ comment.id }}" class="hidden mt-3 reply-form" onclick="event.stopPropagation()">
        <form hx-post="{% url 'learning_logs:reply_comment' comment.id %}"
              hx-target="#replies-{{ comment.id }}"
              hx-swap="beforeend"
              hx-on::after-request="if(event.detail.successful) { this.reset(); this.closest('.reply-form').classList.add('hidden'); }"
              class="flex gap-2">
          <input type="text" name="text" class="flex-1 px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-gray-100 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-200"
                 placeholder="Reply to {{ comment.user.username }}..." maxlength="1000" required>
          <button type="submit" class="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded-lg transition-colors duration-200">Reply</button>
        </form>
      </div>
    </div>
  </div>
  <div id="replies-{{ comment.id }}" class="ml-8 sm:ml-11 border-l-2 border-gray-100 dark:border-gray-700 pl-4"></div>
</div>
