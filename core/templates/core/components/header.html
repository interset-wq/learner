{% load static %}
<header class="bg-green-800 text-white shadow-md py-4 px-6 transition-all duration-300">
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-1">
        <img src="{% static 'favicon.ico' %}" alt="logo" class="w-6 h-6 object-contain">
        <span class="text-xl font-bold">
          <a href="{% url 'core:index' %}" class="text-white hover:text-gray-200 transition-colors duration-200">
            {{ TOML.site.name }}
          </a>
        </span>
      </div>

      <nav class="hidden md:flex items-center space-x-6">
        <a href="{% url 'core:index' %}" class="nav-link">Home</a>
      </nav>
    </div>

    <div class="flex items-center gap-4">
      <button id="themeToggle" class="p-2 rounded hover:bg-green-700 transition-colors" aria-label="Toggle dark mode">
        <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>

      <button id="hamburgerBtn" class="md:hidden relative w-8 h-8 flex flex-col justify-center items-center gap-1.5 focus:outline-none">
        <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
        <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
        <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
      </button>

      <div class="hidden md:flex items-center space-x-4">
        {% if user.is_authenticated %}
          <span class="text-sm font-semibold text-gray-300">Hello, {{ user.username }}</span>
          <form action="{% url 'accounts:logout' %}" method="POST" class="inline">
            {% csrf_token %}
            <button type="submit" class="btn-header">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn-header">Login</a>
          <a href="{% url 'accounts:register' %}" class="btn-header-outline">Register</a>
        {% endif %}
      </div>
    </div>
  </div>

  <div id="mobileMenu" class="md:hidden hidden mt-4 pt-4 border-t border-green-700 flex flex-col space-y-3 transition-all duration-300">
    <a href="{% url 'core:index' %}" class="nav-link-mobile">Home</a>

    {% if user.is_authenticated %}
      <span class="py-1 px-2 text-sm font-semibold text-gray-300">Hello, {{ user.username }}</span>
      <form action="{% url 'accounts:logout' %}" method="POST">
        {% csrf_token %}
        <button type="submit" class="w-full text-left nav-link-mobile">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}" class="nav-link-mobile">Login</a>
      <a href="{% url 'accounts:register' %}" class="nav-link-mobile">Register</a>
    {% endif %}
  </div>
</header>

<script>
  const btn = document.getElementById('hamburgerBtn')
  const menu = document.getElementById('mobileMenu')
  const [line1, line2, line3] = btn.querySelectorAll('.line')

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden')
    const isActive = !line2.classList.contains('opacity-0')

    if (isActive) {
      line1.classList.add('translate-y-2', 'rotate-45')
      line2.classList.add('opacity-0')
      line3.classList.add('-translate-y-2', '-rotate-45')
    } else {
      line1.classList.remove('translate-y-2', 'rotate-45')
      line2.classList.remove('opacity-0')
      line3.classList.remove('-translate-y-2', '-rotate-45')
    }
  })
</script>
