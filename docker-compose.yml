services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/db.sqlite3
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    command: >
      sh -c "
        uv run python manage.py migrate &&
        uv run python manage.py runserver 0.0.0.0:8000
      "

volumes:
  db-data:
