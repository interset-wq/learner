{% load static %}

<header class="bg-green-800 text-white shadow-md py-4 px-6">
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-1">
      <img src="{% static 'favicon.ico' %}" alt="logo">
      <span class="text-xl font-bold">
        <a href="/" class="text-white">{{ TOML.site.name }}</a>
      </span>
    </div>

    <button id="hamburgerBtn" class="md:hidden relative w-8 h-8 flex flex-col justify-center items-center gap-1.5 focus:outline-none">
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
    </button>

    <nav class="hidden md:flex items-center space-x-4">
      <a href="/" class="hover:underline">Home</a>
      <a href="{% url "learning_logs:topics" %}" class="hover:underline">Topics</a>
      {% if user.is_authenticated %}
        <span class="text-sm font-semibold text-gray-300">Hello, {{ user.username }}</span>
        <form action="{% url 'accounts:logout' %}" method="POST" class="inline">
          {% csrf_token %}
          <button type="submit" class="hover:underline">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="hover:underline">Login</a>
        <a href="{% url 'accounts:register' %}" class="hover:underline">Register</a>
      {% endif %}
    </nav>
  </div>

  <div id="mobileMenu" class="md:hidden hidden mt-4 pt-4 border-t border-green-700 flex flex-col space-y-3">
    <a href="/" class="hover:underline py-1">Home</a>
    <a href="{% url "learning_logs:topics" %}" class="hover:underline py-1">Topics</a>
    {% if user.is_authenticated %}
      <span class="text-sm font-semibold text-gray-300 py-1">Hello, {{ user.username }}</span>
      <form action="{% url 'accounts:logout' %}" method="POST">
        {% csrf_token %}
        <button type="submit" class="hover:underline py-1 text-left w-full">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}" class="hover:underline py-1">Login</a>
      <a href="{% url 'accounts:register' %}" class="hover:underline py-1">Register</a>
    {% endif %}
  </div>
</header>

<script>
  const btn = document.getElementById('hamburgerBtn')
  const menu = document.getElementById('mobileMenu')
  const [line1, line2, line3] = btn.querySelectorAll('.line')

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden')
    const isActive = !line2.classList.contains('opacity-0')

    if (isActive) {
      line1.classList.add('translate-y-2', 'rotate-45')
      line2.classList.add('opacity-0')
      line3.classList.add('-translate-y-2', '-rotate-45')
    } else {
      line1.classList.remove('translate-y-2', 'rotate-45')
      line2.classList.remove('opacity-0')
      line3.classList.remove('-translate-y-2', '-rotate-45')
    }
  })
</script>
