{% load static %}
<header class="bg-green-800 text-white shadow-md py-4 px-6 transition-all duration-300">
  <div class="flex justify-between items-center">
    <!-- 左侧整体：Logo + 主导航 -->
    <div class="flex items-center gap-8">
      <!-- Logo & 站点名 -->
      <div class="flex items-center gap-1">
        <img src="{% static 'favicon.ico' %}" alt="logo" class="w-6 h-6 object-contain">
        <span class="text-xl font-bold">
          <a href="{% url 'learning_logs:index' %}" class="text-white hover:text-gray-200 transition-colors duration-200">
            {{ TOML.site.name }}
          </a>
        </span>
      </div>

      <!-- 桌面端主导航（独立左侧区域） -->
      <nav class="hidden md:flex items-center space-x-6">
        <a href="{% url 'learning_logs:index' %}"
           class="relative py-1 text-white hover:text-gray-200 transition-colors duration-200 after:absolute after:left-0 after:bottom-0 after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300 hover:after:w-full">
          Home
        </a>
        <a href="{% url "learning_logs:topics" %}"
           class="relative py-1 text-white hover:text-gray-200 transition-colors duration-200 after:absolute after:left-0 after:bottom-0 after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300 hover:after:w-full">
          Topics
        </a>
      </nav>
    </div>

    <!-- 移动端汉堡按钮 -->
    <button id="hamburgerBtn" class="md:hidden relative w-8 h-8 flex flex-col justify-center items-center gap-1.5 focus:outline-none">
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
      <span class="line block w-full h-0.5 bg-white rounded transition-all duration-300"></span>
    </button>

    <!-- 桌面端用户区域（独立右侧区域） -->
    <div class="hidden md:flex items-center space-x-4">
      {% if user.is_authenticated %}
        <span class="text-sm font-semibold text-gray-300">Hello, {{ user.username }}</span>
        <form action="{% url 'accounts:logout' %}" method="POST" class="inline">
          {% csrf_token %}
          <button type="submit"
                  class="px-3 py-1 rounded hover:bg-green-700 text-white hover:text-gray-200 transition-all duration-200">
            Logout
          </button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}"
           class="px-3 py-1 rounded hover:bg-green-700 text-white hover:text-gray-200 transition-all duration-200">
          Login
        </a>
        <a href="{% url 'accounts:register' %}"
           class="px-3 py-1 rounded border border-white text-white hover:bg-white hover:text-green-800 transition-all duration-200">
          Register
        </a>
      {% endif %}
    </div>
  </div>

  <!-- 移动端下拉菜单 -->
  <div id="mobileMenu" class="md:hidden hidden mt-4 pt-4 border-t border-green-700 flex flex-col space-y-3 transition-all duration-300">
    <a href="{% url 'learning_logs:index' %}"
       class="py-1 px-2 hover:bg-green-700 rounded transition-colors duration-200">
      Home
    </a>
    <a href="{% url "learning_logs:topics" %}"
       class="py-1 px-2 hover:bg-green-700 rounded transition-colors duration-200">
      Topics
    </a>

    {% if user.is_authenticated %}
      <span class="py-1 px-2 text-sm font-semibold text-gray-300">Hello, {{ user.username }}</span>
      <form action="{% url 'accounts:logout' %}" method="POST">
        {% csrf_token %}
        <button type="submit"
                class="w-full text-left py-1 px-2 hover:bg-green-700 rounded transition-colors duration-200">
          Logout
        </button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}"
         class="py-1 px-2 hover:bg-green-700 rounded transition-colors duration-200">
        Login
      </a>
      <a href="{% url 'accounts:register' %}"
         class="py-1 px-2 hover:bg-green-700 rounded transition-colors duration-200">
        Register
      </a>
    {% endif %}
  </div>
</header>

<script>
  const btn = document.getElementById('hamburgerBtn')
  const menu = document.getElementById('mobileMenu')
  const [line1, line2, line3] = btn.querySelectorAll('.line')

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden')
    const isActive = !line2.classList.contains('opacity-0')

    if (isActive) {
      line1.classList.add('translate-y-2', 'rotate-45')
      line2.classList.add('opacity-0')
      line3.classList.add('-translate-y-2', '-rotate-45')
    } else {
      line1.classList.remove('translate-y-2', 'rotate-45')
      line2.classList.remove('opacity-0')
      line3.classList.remove('-translate-y-2', '-rotate-45')
    }
  })
</script>
